<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumen AIOps</title>
<style>
:root{
  --bg:#eef2f8;--m1:#d8e8f8;--m2:#e4d8f8;--m3:#d8f0f0;--m4:#f0e8d8;--m5:#d8f0e4;
  --glass:rgba(255,255,255,0.6);--glass2:rgba(255,255,255,0.84);
  --brd:rgba(255,255,255,0.85);--brd2:rgba(180,200,240,0.38);
  --sh:rgba(90,120,200,0.12);--sh2:rgba(70,100,180,0.07);
  --acc:#2563eb;--acc2:#0891b2;--acc3:#7c3aed;
  --red:#dc2626;--ora:#ea580c;--yel:#ca8a04;--grn:#059669;--tea:#0891b2;
  --txt:#1e293b;--txt2:#64748b;--txt3:#94a3b8;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  --mono:'Courier New',Courier,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);color:var(--txt);display:flex;flex-direction:column;background:var(--bg)}
.bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.6;animation:drift 20s ease-in-out infinite alternate}
.b1{width:700px;height:700px;background:var(--m1);top:-150px;left:-100px}
.b2{width:550px;height:550px;background:var(--m2);top:15%;right:-80px;animation-delay:-7s}
.b3{width:500px;height:500px;background:var(--m3);bottom:-100px;left:25%;animation-delay:-13s}
.b4{width:420px;height:420px;background:var(--m4);bottom:5%;right:15%;animation-delay:-4s}
.b5{width:380px;height:380px;background:var(--m5);top:40%;left:40%;animation-delay:-10s}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(25px,18px) scale(1.05)}}
#login-screen{position:fixed;inset:0;z-index:9000;display:flex;align-items:center;justify-content:center}
.lcard{width:440px;background:var(--glass2);backdrop-filter:blur(40px) saturate(2);border:1px solid var(--brd);border-radius:22px;padding:40px;box-shadow:0 20px 60px var(--sh);animation:li .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes li{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.l-hex{width:52px;height:52px;background:linear-gradient(135deg,var(--acc),var(--acc3));clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.l-title{font-size:26px;font-weight:800;text-align:center;margin-bottom:4px}
.l-sub{font-size:11px;color:var(--txt2);text-align:center;margin-bottom:24px}
.l-lbl{font-size:10px;color:var(--txt2);letter-spacing:.1em;text-transform:uppercase;display:block;font-weight:700;margin-bottom:5px}
.l-input{width:100%;padding:10px 14px;border-radius:9px;border:1px solid rgba(180,200,240,.5);background:rgba(255,255,255,.75);font-family:var(--mono);font-size:13px;color:var(--txt);outline:none;transition:all .15s;margin-bottom:14px}
.l-input:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.l-err{font-size:11px;color:var(--red);text-align:center;margin-bottom:10px;display:none}
.l-btn{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--acc),var(--acc3));color:#fff;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.l-btn:hover{transform:translateY(-1px)}
.l-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.l-note{font-size:10px;color:var(--txt3);text-align:center;margin-top:10px}
#app{display:none;flex-direction:column;height:100%;position:relative;z-index:1}
#app.on{display:flex}
.topbar{height:52px;flex-shrink:0;background:rgba(255,255,255,.8);backdrop-filter:blur(30px) saturate(2);border-bottom:1px solid var(--brd);box-shadow:0 2px 14px var(--sh2);display:flex;align-items:center;padding:0 18px;gap:12px;z-index:100}
.t-logo{font-size:17px;font-weight:800;letter-spacing:.06em;display:flex;align-items:center;gap:9px}
.t-hex{width:30px;height:30px;background:linear-gradient(135deg,var(--acc),var(--acc3));clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-size:12px}
.t-logo span{color:var(--acc)}
.vd{width:1px;height:22px;background:var(--brd2)}
.tl{font-size:10px;color:var(--txt2)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--grn);box-shadow:0 0 8px rgba(5,150,105,.6);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.t-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.uc{display:flex;align-items:center;gap:8px;padding:5px 12px 5px 6px;border-radius:20px;background:rgba(255,255,255,.72);border:1px solid var(--brd2);cursor:pointer}
.ua{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700}
.un{font-size:11px;font-weight:600;color:var(--txt)}
.rb{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700}
.rb-admin{background:rgba(124,58,237,.12);color:var(--acc3);border:1px solid rgba(124,58,237,.25)}
.rb-sre{background:rgba(37,99,235,.12);color:var(--acc);border:1px solid rgba(37,99,235,.25)}
.rb-noc{background:rgba(8,145,178,.12);color:var(--tea);border:1px solid rgba(8,145,178,.25)}
.rb-viewer{background:rgba(100,116,139,.1);color:var(--txt2);border:1px solid rgba(100,116,139,.2)}
.logout-btn{padding:5px 12px;border-radius:7px;border:1px solid var(--brd2);background:rgba(255,255,255,.7);color:var(--txt2);font-size:10px;cursor:pointer}
.logout-btn:hover{border-color:var(--red);color:var(--red)}
.role-banner{padding:5px 18px;font-size:10px;font-weight:600;text-align:center;flex-shrink:0}
.rb-banner-admin{background:rgba(124,58,237,.08);color:var(--acc3);border-bottom:1px solid rgba(124,58,237,.15)}
.rb-banner-sre{background:rgba(37,99,235,.07);color:var(--acc);border-bottom:1px solid rgba(37,99,235,.15)}
.rb-banner-noc{background:rgba(8,145,178,.07);color:var(--tea);border-bottom:1px solid rgba(8,145,178,.15)}
.rb-banner-viewer{background:rgba(100,116,139,.06);color:var(--txt2);border-bottom:1px solid rgba(100,116,139,.12)}
.layout{flex:1;display:flex;overflow:hidden}
.sidebar{width:228px;flex-shrink:0;background:rgba(255,255,255,.58);backdrop-filter:blur(24px) saturate(1.8);border-right:1px solid var(--brd);display:flex;flex-direction:column;padding:12px 0;overflow-y:auto}
.ns{padding:0 10px;margin-bottom:4px}
.nl{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--txt3);padding:8px 10px 4px;font-weight:600}
.ni{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:9px;cursor:pointer;font-size:12px;color:var(--txt2);transition:all .15s;margin-bottom:2px;font-weight:600;position:relative;user-select:none}
.ni:hover{background:rgba(37,99,235,.06);color:var(--txt)}
.ni.active{background:rgba(37,99,235,.1);color:var(--acc);border:1px solid rgba(37,99,235,.2)}
.ni.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;background:var(--acc);border-radius:0 2px 2px 0}
.ni-icon{font-size:14px;width:20px;text-align:center}
.nbadge{margin-left:auto;font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px}
.nred{background:rgba(220,38,38,.12);color:var(--red);border:1px solid rgba(220,38,38,.25)}
.nyel{background:rgba(202,138,4,.1);color:var(--yel);border:1px solid rgba(202,138,4,.2)}
.ni.locked{opacity:.32;cursor:not-allowed;pointer-events:none}
.ptag{font-size:8px;padding:1px 5px;border-radius:4px;background:rgba(180,200,240,.3);color:var(--txt3);margin-left:auto}
.sfooter{margin-top:auto;padding:10px 12px;border-top:1px solid rgba(180,200,240,.22)}
.src-chip{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:6px;font-size:10px;color:var(--txt2);margin-bottom:3px;border:1px solid rgba(180,200,240,.28);background:rgba(255,255,255,.4);font-family:var(--mono)}
.src-dot{width:6px;height:6px;border-radius:50%}
.main{flex:1;overflow-y:auto;padding:20px;position:relative;z-index:1}
.page{display:none}
.page.active{display:block;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.phead{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.pt{font-size:22px;font-weight:800;margin-bottom:4px}
.ps{font-size:11px;color:var(--txt3)}
.pactions{display:flex;gap:8px;align-items:center}
.card{background:var(--glass);backdrop-filter:blur(20px) saturate(1.6);border:1px solid var(--brd);border-radius:14px;padding:18px;box-shadow:0 4px 20px var(--sh2);transition:box-shadow .2s}
.card:hover{box-shadow:0 6px 28px var(--sh)}
.ctitle{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt2);font-weight:700;margin-bottom:12px}
.sg{display:grid;gap:14px;margin-bottom:18px}
.sg4{grid-template-columns:repeat(4,1fr)}
.sg3{grid-template-columns:repeat(3,1fr)}
.sc{background:var(--glass);backdrop-filter:blur(20px) saturate(1.6);border:1px solid var(--brd);border-radius:14px;padding:16px 18px;box-shadow:0 4px 20px var(--sh2)}
.sv{font-size:28px;font-weight:700;font-family:var(--mono);line-height:1;margin-bottom:3px}
.sl{font-size:9px;color:var(--txt2);letter-spacing:.1em;text-transform:uppercase}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.gm{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px}
.btn{padding:7px 14px;border-radius:7px;border:1px solid var(--brd2);background:rgba(255,255,255,.72);color:var(--txt2);font-size:11px;cursor:pointer;font-family:var(--font);transition:all .15s}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn.p{background:rgba(37,99,235,.1);border-color:rgba(37,99,235,.38);color:var(--acc);font-weight:600}
.btn.g{background:rgba(5,150,105,.1);border-color:rgba(5,150,105,.3);color:var(--grn);font-weight:600}
.btn.r{background:rgba(220,38,38,.08);border-color:rgba(220,38,38,.28);color:var(--red)}
.tag{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:600;display:inline-block}
.t-r{background:rgba(220,38,38,.1);color:var(--red);border:1px solid rgba(220,38,38,.2)}
.t-o{background:rgba(234,88,12,.1);color:var(--ora);border:1px solid rgba(234,88,12,.2)}
.t-y{background:rgba(202,138,4,.1);color:var(--yel);border:1px solid rgba(202,138,4,.2)}
.t-g{background:rgba(5,150,105,.1);color:var(--grn);border:1px solid rgba(5,150,105,.2)}
.t-b{background:rgba(37,99,235,.1);color:var(--acc);border:1px solid rgba(37,99,235,.2)}
.t-p{background:rgba(124,58,237,.1);color:var(--acc3);border:1px solid rgba(124,58,237,.2)}
.t-gr{background:rgba(100,116,139,.08);color:var(--txt2);border:1px solid rgba(100,116,139,.18)}
.aitem{display:flex;align-items:flex-start;gap:11px;padding:11px;border-radius:10px;border:1px solid transparent;cursor:pointer;transition:all .15s;margin-bottom:7px}
.aitem:hover{background:rgba(37,99,235,.03);border-color:rgba(180,200,240,.3)}
.aitem.d{border-left:3px solid var(--red)}
.aitem.h{border-left:3px solid var(--ora)}
.aitem.w{border-left:3px solid var(--yel)}
.asev{font-size:8px;font-weight:700;padding:3px 7px;border-radius:4px;text-transform:uppercase;white-space:nowrap;margin-top:1px}
.sd{background:rgba(220,38,38,.1);color:var(--red);border:1px solid rgba(220,38,38,.25)}
.sh2b{background:rgba(234,88,12,.1);color:var(--ora);border:1px solid rgba(234,88,12,.25)}
.sw{background:rgba(202,138,4,.08);color:var(--yel);border:1px solid rgba(202,138,4,.2)}
.abody{flex:1;min-width:0}
.aname{font-size:12px;font-weight:700;color:var(--txt);margin-bottom:2px}
.adesc{font-size:10px;color:var(--txt2);margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono)}
.ameta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.tbl{width:100%;border-collapse:collapse;font-size:10px}
.tbl thead th{position:sticky;top:0;background:rgba(255,255,255,.9);padding:7px 10px;text-align:left;font-size:9px;color:var(--txt2);letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid rgba(180,200,240,.35);font-weight:600;white-space:nowrap}
.tbl tbody tr{border-bottom:1px solid rgba(180,200,240,.12);cursor:pointer;transition:background .1s}
.tbl tbody tr:hover{background:rgba(37,99,235,.03)}
.tbl td{padding:5px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;font-family:var(--mono);font-size:10px}
.loading{text-align:center;padding:40px;color:var(--txt3);font-size:12px}
.spinner{width:24px;height:24px;border:3px solid rgba(37,99,235,.2);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay{display:none;position:fixed;inset:0;background:rgba(200,215,240,.45);backdrop-filter:blur(16px) saturate(1.5);z-index:5000;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:rgba(255,255,255,.9);backdrop-filter:blur(40px) saturate(2.5);border:1px solid var(--brd);border-radius:16px;width:580px;max-height:82vh;overflow-y:auto;box-shadow:0 20px 60px rgba(90,120,200,.2);animation:mi .22s cubic-bezier(.34,1.56,.64,1)}
@keyframes mi{from{opacity:0;transform:scale(.94) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mh{padding:18px 22px 14px;border-bottom:1px solid rgba(180,200,240,.3);display:flex;align-items:flex-start;justify-content:space-between}
.mb{padding:16px 22px 22px}
.mclose{background:rgba(180,200,240,.2);border:1px solid rgba(180,200,240,.4);color:var(--txt2);font-size:14px;cursor:pointer;padding:4px 9px;border-radius:6px;line-height:1}
.mclose:hover{background:rgba(220,38,38,.1);color:var(--red)}
.dr{display:flex;gap:8px;margin-bottom:8px}
.dk{font-size:10px;color:var(--txt2);min-width:130px;padding-top:2px}
.dv{font-size:11px;color:var(--txt);flex:1;line-height:1.6;font-family:var(--mono)}
.divline{height:1px;background:rgba(180,200,240,.3);margin:12px 0}
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:11px 16px;border-radius:10px;font-size:11px;font-weight:600;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border:1px solid var(--brd);box-shadow:0 8px 24px var(--sh);animation:toast-in .3s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:8px;max-width:340px;pointer-events:all}
@keyframes toast-in{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.toast.s{border-color:rgba(5,150,105,.3);background:rgba(240,255,248,.97)}
.toast.e{border-color:rgba(220,38,38,.25);background:rgba(255,242,242,.97)}
.toast.i{border-color:rgba(37,99,235,.25);background:rgba(240,245,255,.97)}
.toast.w{border-color:rgba(202,138,4,.25);background:rgba(255,252,235,.97)}
.toggle{width:34px;height:18px;border-radius:9px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--grn)}.toggle.off{background:rgba(180,200,240,.5)}
.toggle::after{content:'';position:absolute;top:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle.on::after{left:17px}.toggle.off::after{left:2px}
.sinput{width:100%;padding:7px 10px;border-radius:7px;border:1px solid rgba(180,200,240,.5);background:rgba(255,255,255,.75);font-size:12px;color:var(--txt);outline:none;font-family:var(--mono)}
.sinput:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
/* Bar chart */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-label{font-size:10px;color:var(--txt2);min-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono)}
.bar-track{flex:1;height:8px;background:rgba(180,200,240,.2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .6s}
.bar-val{font-size:10px;color:var(--txt2);min-width:28px;text-align:right;font-weight:600}
/* Trend chart */
.trend-wrap{display:flex;align-items:flex-end;gap:3px;height:60px;padding-top:4px}
.trend-bar{flex:1;border-radius:3px 3px 0 0;min-width:4px;transition:height .4s;cursor:pointer;position:relative}
.trend-bar:hover::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--txt);color:#fff;font-size:9px;padding:2px 6px;border-radius:4px;white-space:nowrap;margin-bottom:3px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(180,200,240,.5);border-radius:2px}
</style>
</head>
<body>
<div class="bg"><div class="bb b1"></div><div class="bb b2"></div><div class="bb b3"></div><div class="bb b4"></div><div class="bb b5"></div></div>

<div id="login-screen">
<div class="lcard">
  <div class="l-hex">&#11041;</div>
  <div class="l-title">Lumen AIOps</div>
  <div class="l-sub">Bankacilik Operasyon Merkezi</div>
  <label class="l-lbl">Kullanici Adi</label>
  <input class="l-input" id="l-user" placeholder="kullanici adi" autocomplete="username"/>
  <label class="l-lbl">Sifre</label>
  <input class="l-input" id="l-pass" type="password" placeholder="sifre" autocomplete="current-password"/>
  <div class="l-err" id="l-err">Kullanici adi veya sifre hatali</div>
  <button class="l-btn" id="l-btn" onclick="doLogin()">Giris Yap</button>
  <div class="l-note">LDAP / Active Directory + Local fallback</div>
</div>
</div>

<div id="app">
<div class="topbar">
  <div class="t-logo"><div class="t-hex">&#11041;</div>Lumen <span>AIOps</span></div>
  <div class="vd"></div>
  <div class="dot" id="api-dot"></div>
  <div class="tl" id="t-ctx">Bankacilik Operasyon Merkezi</div>
  <div class="vd"></div>
  <div class="tl" id="t-page">Dashboard</div>
  <div class="t-right">
    <div class="tl" id="t-clock" style="font-family:var(--mono)">--:--:--</div>
    <div class="uc" onclick="openPwdModal()" title="Sifre degistir">
      <div class="ua" id="u-av" style="background:linear-gradient(135deg,var(--acc),var(--acc3))">?</div>
      <div class="un" id="u-nm">-</div>
      <div class="rb rb-admin" id="u-rb">-</div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Cikis</button>
  </div>
</div>
<div class="role-banner rb-banner-admin" id="role-banner"></div>
<div class="layout">
<div class="sidebar" id="sidebar"></div>
<div class="main" id="main-area"></div>
</div>
</div>

<div class="overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="mh">
      <div><div id="m-badge" style="margin-bottom:6px"></div><div id="m-title" style="font-size:17px;font-weight:800;color:var(--txt)"></div></div>
      <button class="mclose" onclick="closeModal()">X</button>
    </div>
    <div class="mb" id="m-body"></div>
  </div>
</div>

<div class="overlay" id="pwd-overlay" onclick="if(event.target===this)closePwdModal()">
  <div class="modal" style="width:420px">
    <div class="mh"><div><div style="font-size:17px;font-weight:800">Sifre Degistir</div></div><button class="mclose" onclick="closePwdModal()">X</button></div>
    <div class="mb">
      <label class="l-lbl">Mevcut Sifre</label>
      <input class="l-input" id="pwd-current" type="password"/>
      <label class="l-lbl">Yeni Sifre</label>
      <input class="l-input" id="pwd-new" type="password"/>
      <label class="l-lbl">Yeni Sifre (Tekrar)</label>
      <input class="l-input" id="pwd-confirm" type="password"/>

<script>
var API = window.location.origin;
var TOKEN = localStorage.getItem('lumen_token') || '';
var CURRENT_USER = {};
var AUTO_REFRESH = null;
var _fpAnomalyId = null;

var ROLE_CONFIG = {
  'Admin':       {cls:'rb-admin',  bannerCls:'rb-banner-admin',  bannerText:'Admin - Tam erisim', color:'#7c3aed'},
  'SRE Lead':    {cls:'rb-sre',    bannerCls:'rb-banner-sre',    bannerText:'SRE Lead - Anomali + Agent', color:'#2563eb'},
  'NOC Analyst': {cls:'rb-noc',    bannerCls:'rb-banner-noc',    bannerText:'NOC Analyst - Log izleme', color:'#0891b2'},
  'Viewer':      {cls:'rb-viewer', bannerCls:'rb-banner-viewer', bannerText:'Viewer - Sadece dashboard', color:'#94a3b8'}
};

async function apiFetch(path, opts) {
  opts = opts || {};
  var headers = {'Content-Type': 'application/json'};
  if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  if (opts.headers) Object.assign(headers, opts.headers);
  var resp = await fetch(API + path, Object.assign({}, opts, {headers: headers}));
  if (resp.status === 401) { doLogout(); return null; }
  if (!resp.ok) throw new Error('API ' + resp.status + ': ' + path);
  return resp.json();
}

async function doLogin() {
  var user = document.getElementById('l-user').value.trim();
  var pass = document.getElementById('l-pass').value;
  if (!user || !pass) { showLoginErr('Kullanici adi ve sifre gerekli'); return; }
  var btn = document.getElementById('l-btn');
  btn.disabled = true; btn.textContent = 'Giris yapiliyor...';
  try {
    var form = new URLSearchParams();
    form.append('username', user); form.append('password', pass);
    var resp = await fetch(API + '/auth/login', {method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: form.toString()});
    if (!resp.ok) { showLoginErr('Kullanici adi veya sifre hatali'); btn.disabled=false; btn.textContent='Giris Yap'; return; }
    var data = await resp.json();
    TOKEN = data.access_token;
    localStorage.setItem('lumen_token', TOKEN);
    CURRENT_USER = {username: data.username, roles: data.roles};
    var me = await apiFetch('/auth/me');
    if (me) CURRENT_USER.permissions = me.permissions;
    startApp();
  } catch(e) { showLoginErr('Sunucuya baglanılamadi'); btn.disabled=false; btn.textContent='Giris Yap'; }
}

function showLoginErr(msg) { var el=document.getElementById('l-err'); el.textContent=msg; el.style.display='block'; }

function doLogout() {
  TOKEN=''; CURRENT_USER={};
  localStorage.removeItem('lumen_token');
  if (AUTO_REFRESH) clearInterval(AUTO_REFRESH);
  document.getElementById('app').classList.remove('on');
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('l-err').style.display='none';
  document.getElementById('l-btn').disabled=false;
  document.getElementById('l-btn').textContent='Giris Yap';
}

function startApp() {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').classList.add('on');
  var role = (CURRENT_USER.roles && CURRENT_USER.roles[0]) || 'Viewer';
  var rc = ROLE_CONFIG[role] || ROLE_CONFIG['Viewer'];
  var av = document.getElementById('u-av');
  av.textContent = CURRENT_USER.username ? CURRENT_USER.username.slice(0,2).toUpperCase() : '?';
  av.style.background = 'linear-gradient(135deg,' + rc.color + ',' + rc.color + 'aa)';
  document.getElementById('u-nm').textContent = CURRENT_USER.username;
  document.getElementById('u-rb').textContent = role;
  document.getElementById('u-rb').className = 'rb ' + rc.cls;
  document.getElementById('role-banner').textContent = rc.bannerText;
  document.getElementById('role-banner').className = 'role-banner ' + rc.bannerCls;
  buildSidebar(); buildPages(); showPage('dashboard');
  AUTO_REFRESH = setInterval(function() {
    var ap = document.querySelector('.page.active');
    if (ap && ap.id==='page-dashboard') loadDashboard();
    if (ap && ap.id==='page-anomalies') loadAnomalies('all',null);
  }, 60000);
  setInterval(function() { var el=document.getElementById('t-clock'); if(el) el.textContent=new Date().toLocaleTimeString('tr-TR',{timeZone:'Europe/Istanbul'}); }, 1000);
  checkAPIHealth(); setInterval(checkAPIHealth, 30000);
}

async function checkAPIHealth() {
  var dot = document.getElementById('api-dot');
  try { var d=await apiFetch('/health'); if(d){dot.style.background='var(--grn)';dot.style.boxShadow='0 0 8px rgba(5,150,105,.6)';} }
  catch(e) { dot.style.background='var(--red)'; dot.style.boxShadow='0 0 8px rgba(220,38,38,.6)'; }
}

window.addEventListener('load', async function() {
  if (TOKEN) {
    try { var me=await apiFetch('/auth/me'); if(me){CURRENT_USER={username:me.username,roles:me.roles,permissions:me.permissions};startApp();return;} } catch(e) {}
    TOKEN=''; localStorage.removeItem('lumen_token');
  }
});

function hasPerm(perm) { return CURRENT_USER.permissions && CURRENT_USER.permissions.indexOf(perm) >= 0; }
function hasRole(role) { return CURRENT_USER.roles && CURRENT_USER.roles.indexOf(role) >= 0; }
function isAdmin() { return hasRole('Admin'); }
function isSRE() { return hasRole('SRE Lead') || isAdmin(); }
function isNOC() { return hasRole('NOC Analyst') || isSRE(); }

function buildSidebar() {
  var html = '';
  html += '<div class="ns"><div class="nl">Genel</div>';
  html += '<div class="ni" id="nav-dashboard" onclick="showPage(\'dashboard\',this)"><span class="ni-icon">&#9672;</span>Dashboard</div></div>';
  html += '<div class="ns"><div class="nl">Faz 1 - Log Anomalisi</div>';
  html += '<div class="ni" id="nav-anomalies" onclick="showPage(\'anomalies\',this)"><span class="ni-icon">&#9889;</span>Anomaliler<span class="nbadge nred" id="anom-count-badge">-</span></div>';
  if (!hasRole('Viewer')) {
    html += '<div class="ni" id="nav-errorcodes" onclick="showPage(\'errorcodes\',this)"><span class="ni-icon">&#128290;</span>Hata Kodlari</div>';
    html += '<div class="ni" id="nav-runs" onclick="showPage(\'runs\',this)"><span class="ni-icon">&#128203;</span>Detection Runs</div>';
  }
  html += '</div>';
  if (!hasRole('Viewer')) {
    html += '<div class="ns"><div class="nl">SRE Agent</div>';
    html += '<div class="ni" id="nav-sre" onclick="showPage(\'sre\',this)"><span class="ni-icon">&#129302;</span>Aksiyon Merkezi' + (isSRE() ? '<span class="nbadge nyel" id="sre-count-badge">-</span>' : '<span class="ptag">gorunum</span>') + '</div>';
    html += '</div>';
  }
  html += '<div class="ns"><div class="nl">Ileride Gelecek</div>';
  html += '<div class="ni locked"><span class="ni-icon">&#128200;</span>Metrik Anomalisi<span class="ptag">Faz 2</span></div>';
  html += '<div class="ni locked"><span class="ni-icon">&#11041;</span>Topoloji<span class="ptag">Faz 3</span></div>';
  html += '</div>';
  if (isAdmin()) {
    html += '<div class="ns"><div class="nl">Yonetim</div>';
    html += '<div class="ni" id="nav-anomsettings" onclick="showPage(\'anomsettings\',this)"><span class="ni-icon">&#9881;</span>Anomali Ayarlari</div>';
    html += '<div class="ni" id="nav-channels" onclick="showPage(\'channels\',this)"><span class="ni-icon">&#128279;</span>Kanal Tanimlari</div>';
    html += '<div class="ni" id="nav-auditlogs" onclick="showPage(\'auditlogs\',this)"><span class="ni-icon">&#128196;</span>Audit Loglar</div>';
    html += '</div>';
  }
  html += '<div class="sfooter">';
  html += '<div style="font-size:9px;color:var(--txt3);margin-bottom:6px;font-weight:600;text-transform:uppercase">Veri Kaynaklari</div>';
  html += '<div class="src-chip"><div class="src-dot" style="background:var(--grn);box-shadow:0 0 5px var(--grn)"></div>Logstash Push</div>';
  html += '<div class="src-chip"><div class="src-dot" style="background:var(--grn);box-shadow:0 0 5px var(--grn)"></div>LLM Servisi</div>';
  html += '<div class="src-chip"><div class="src-dot" style="background:var(--grn);box-shadow:0 0 5px var(--grn)"></div>Zabbix API</div>';
  html += '</div>';
  document.getElementById('sidebar').innerHTML = html;
}

function buildPages() {
  document.getElementById('main-area').innerHTML =
    '<div class="page" id="page-dashboard"></div>' +
    '<div class="page" id="page-anomalies"></div>' +
    '<div class="page" id="page-errorcodes"></div>' +
    '<div class="page" id="page-runs"></div>' +
    '<div class="page" id="page-sre"></div>' +
    '<div class="page" id="page-anomsettings"></div>' +
    '<div class="page" id="page-channels"></div>' +
    '<div class="page" id="page-auditlogs"></div>';
}

function showPage(name, navEl) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.ni').forEach(function(n) { n.classList.remove('active'); });
  var pg = document.getElementById('page-' + name);
  if (pg) pg.classList.add('active');
  if (navEl) navEl.classList.add('active');
  else { var nav=document.getElementById('nav-'+name); if(nav) nav.classList.add('active'); }
  var names = {dashboard:'Dashboard',anomalies:'Anomaliler',errorcodes:'Hata Kodlari',runs:'Detection Runs',sre:'SRE Agent',anomsettings:'Anomali Ayarlari',channels:'Kanal Tanimlari',auditlogs:'Audit Loglar'};
  document.getElementById('t-page').textContent = names[name] || name;
  var loaders = {dashboard:loadDashboard, anomalies:function(){loadAnomalies('all',null);}, errorcodes:loadErrorCodes, runs:loadRuns, sre:loadSRE, anomsettings:loadAnomSettings, channels:loadChannels, auditlogs:loadAuditLogs};
  if (loaders[name]) loaders[name]();
}

async function loadDashboard() {
  var el = document.getElementById('page-dashboard');
  el.innerHTML = loadingHtml();
  try {
    var stats = await apiFetch('/api/v1/dashboard/stats');
    var anomalies = await apiFetch('/api/v1/anomalies?limit=5');
    var badge = document.getElementById('anom-count-badge');
    if (badge && anomalies) badge.textContent = anomalies.length;

    var byService = stats.by_service || [];
    var byChannel = stats.by_channel || [];
    var trend = stats.trend_24h || [];
    var maxSvc = byService.length ? Math.max.apply(null, byService.map(function(s){return s.count;})) : 1;
    var maxCh = byChannel.length ? Math.max.apply(null, byChannel.map(function(c){return c.count;})) : 1;
    var maxTrend = trend.length ? Math.max.apply(null, trend.map(function(t){return t.count;})) : 1;

    el.innerHTML =
      '<div class="phead"><div><div class="pt">Operasyon Merkezi</div><div class="ps">Son 24 saat - Otomatik yenileme 60s</div></div></div>' +
      '<div class="sg sg4" style="margin-bottom:18px">' +
      '<div class="sc"><div class="sv" style="color:var(--red)">' + ((stats&&stats.active_anomalies)||0) + '</div><div class="sl">Aktif Anomali</div></div>' +
      '<div class="sc"><div class="sv" style="color:var(--acc)">' + ((stats&&stats.total_anomalies)||0) + '</div><div class="sl">Toplam Anomali</div></div>' +
      '<div class="sc"><div class="sv" style="color:var(--ora);font-size:22px">' + ((stats&&stats.false_positive_count)||0) + '</div><div class="sl">False Positive</div></div>' +
      '<div class="sc"><div class="sv" style="color:var(--grn);font-size:18px">' + ((stats&&stats.last_run&&stats.last_run.status)||'-') + '</div><div class="sl">Son Dongu</div>' +
      '<div style="font-size:9px;color:var(--txt3)">' + ((stats&&stats.last_run&&stats.last_run.finished_at) ? new Date(stats.last_run.finished_at).toLocaleTimeString('tr-TR',{timeZone:'Europe/Istanbul'}) : '-') + '</div>' +
      '</div></div>' +

      // Trend
      '<div class="card" style="margin-bottom:16px">' +
      '<div class="ctitle">Son 24 Saat Anomali Trendi</div>' +
      (trend.length ?
        '<div class="trend-wrap">' +
        trend.map(function(t) {
          var h = maxTrend > 0 ? Math.max(4, Math.round(t.count / maxTrend * 56)) : 4;
          var color = t.count >= 5 ? 'var(--red)' : t.count >= 2 ? 'var(--ora)' : 'var(--acc)';
          return '<div class="trend-bar" style="height:' + h + 'px;background:' + color + ';opacity:.8" data-tip="' + t.hour + ': ' + t.count + ' anomali" title="' + t.hour + ': ' + t.count + '"></div>';
        }).join('') +
        '</div>' +
        '<div style="display:flex;justify-content:space-between;margin-top:4px">' +
        '<span style="font-size:9px;color:var(--txt3)">' + (trend[0] ? trend[0].hour : '') + '</span>' +
        '<span style="font-size:9px;color:var(--txt3)">' + (trend[trend.length-1] ? trend[trend.length-1].hour : '') + '</span>' +
        '</div>'
        : emptyHtml('Son 24 saatte anomali yok')) +
      '</div>' +

      '<div class="g2">' +
      // Servis dagilimi
      '<div class="card">' +
      '<div class="ctitle">Servis Bazli Dagilim (24s)</div>' +
      (byService.length ?
        byService.map(function(s) {
          var w = maxSvc > 0 ? Math.round(s.count / maxSvc * 100) : 0;
          var color = s.disaster > 0 ? 'var(--red)' : s.high > 0 ? 'var(--ora)' : 'var(--acc)';
          return '<div class="bar-row">' +
            '<div class="bar-label" title="' + s.service + '">' + s.service + '</div>' +
            '<div class="bar-track"><div class="bar-fill" style="width:' + w + '%;background:' + color + '"></div></div>' +
            '<div class="bar-val">' + s.count + '</div>' +
            '</div>';
        }).join('') : emptyHtml('Veri yok')) +
      '</div>' +

      // Kanal dagilimi
      '<div class="card">' +
      '<div class="ctitle">Kanal Bazli Dagilim (24s)</div>' +
      (byChannel.length ?
        byChannel.map(function(c) {
          var w = maxCh > 0 ? Math.round(c.count / maxCh * 100) : 0;
          return '<div class="bar-row">' +
            '<div class="bar-label">' + c.channel_name + '</div>' +
            '<div class="bar-track"><div class="bar-fill" style="width:' + w + '%;background:var(--acc2)"></div></div>' +
            '<div class="bar-val">' + c.count + '</div>' +
            '</div>';
        }).join('') : emptyHtml('Veri yok')) +
      '</div>' +
      '</div>' +

      // Son anomaliler
      '<div class="card">' +
      '<div class="ctitle">Son Anomaliler</div>' +
      (anomalies&&anomalies.length ? anomaliesHtml(anomalies) : emptyHtml('Henuz anomali yok')) +
      '</div>';

  } catch(e) { el.innerHTML = errorHtml(e.message); }
}

async function loadAnomalies(severity, category) {
  var el = document.getElementById('page-anomalies');
  el.innerHTML =
    '<div class="phead"><div><div class="pt">Anomali Merkezi</div><div class="ps">Kural Motoru + Z-Score + IF</div></div></div>' +
    '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">' +
    '<button class="btn ' + (!severity||severity==="all"&&!category?'p':'') + '" onclick="loadAnomalies(\'all\',null)">Tumu</button>' +
    '<button class="btn ' + (severity==="DISASTER"?'p':'') + '" onclick="loadAnomalies(\'DISASTER\',null)">Kritik</button>' +
    '<button class="btn ' + (severity==="HIGH"?'p':'') + '" onclick="loadAnomalies(\'HIGH\',null)">Yuksek</button>' +
    '<button class="btn ' + (severity==="WARNING"?'p':'') + '" onclick="loadAnomalies(\'WARNING\',null)">Uyari</button>' +
    '<div style="width:1px;background:rgba(180,200,240,.4);margin:0 4px"></div>' +
    '<button class="btn" style="border-color:var(--ora);color:' + (category==="SYS"?'var(--ora)':'var(--txt2)') + '" onclick="loadAnomalies(\'all\',\'SYS\')">SYS</button>' +
    '<button class="btn" style="border-color:var(--red);color:' + (category==="BIZ"?'var(--red)':'var(--txt2)') + '" onclick="loadAnomalies(\'all\',\'BIZ\')">BIZ</button>' +
    '<button class="btn" style="border-color:var(--acc);color:' + (category==="PERFORMANCE"?'var(--acc)':'var(--txt2)') + '" onclick="loadAnomalies(\'all\',\'PERFORMANCE\')">PERF</button>' +
    '</div>' +
    '<div id="anom-list-container">' + loadingHtml() + '</div>';
  try {
    var url = '/api/v1/anomalies?limit=100';
    if (severity && severity !== 'all') url += '&severity=' + severity;
    if (category) url += '&category=' + category;
    var anomalies = await apiFetch(url);
    document.getElementById('anom-list-container').innerHTML = anomalies&&anomalies.length ? anomaliesHtml(anomalies) : emptyHtml('Anomali bulunamadi');
    var badge = document.getElementById('anom-count-badge');
    if (badge) badge.textContent = (anomalies&&anomalies.length)||0;
  } catch(e) { document.getElementById('anom-list-container').innerHTML = errorHtml(e.message); }
}

function anomaliesHtml(list) {
  var sevMap = {DISASTER:'d',HIGH:'h',WARNING:'w'};
  var sevLbl = {DISASTER:'KRITIK',HIGH:'YUKSEK',WARNING:'UYARI'};
  var sevCls = {d:'sd',h:'sh2b',w:'sw'};
  return list.map(function(a) {
    var s = sevMap[a.severity] || 'w';
    var chDisplay = a.channel_name && a.channel_name !== a.channel_code ? a.channel_name : a.channel_code;
    return '<div class="aitem ' + s + '" onclick="openAnomModal(' + a.id + ')">' +
      '<div><div class="asev ' + sevCls[s] + '">' + (sevLbl[a.severity]||a.severity) + '</div></div>' +
      '<div class="abody">' +
      '<div class="aname">' + (a.service||'-') + ' [' + (chDisplay||'-') + ']</div>' +
      '<div class="adesc">' + (a.summary||'-') + '</div>' +
      '<div class="ameta">' +
      '<span class="tag t-b">' + (a.anomaly_type||'-') + '</span>' +
      (a.result_category ? '<span class="tag ' + (a.result_category==='SYS'?'t-o':a.result_category==='BIZ'?'t-r':'t-b') + '">' + a.result_category + (a.result_code?' ('+a.result_code+')':'') + '</span>' : '') +
      '<span style="font-size:9px;color:var(--txt3)">' + (a.detected_at ? new Date(a.detected_at).toLocaleString('tr-TR',{timeZone:'Europe/Istanbul'}) : '-') + '</span>' +
      (a.zabbix_sent ? '<span class="tag t-g">Zabbix</span>' : '<span class="tag t-y">Bekliyor</span>') +
      (a.is_false_positive ? '<span class="tag t-r" style="margin-left:4px">FP</span>' :
        a.acknowledged ? '<span class="tag t-g" style="margin-left:4px">Onaylandi</span>' :
        '<button class="btn" style="padding:2px 8px;font-size:9px;margin-left:4px" onclick="event.stopPropagation();ackAnomaly(' + a.id + ')">Onayla</button>') +
      '</div></div></div>';
  }).join('');
}

async function openAnomModal(id) {
  try {
    var a = await apiFetch('/api/v1/anomalies/' + id);
    if (!a) return;
    var sevMap2 = {DISASTER:'sd',HIGH:'sh2b',WARNING:'sw'};
    var sevLbl2 = {DISASTER:'KRITIK',HIGH:'YUKSEK',WARNING:'UYARI'};
    var chDisplay = a.channel_name && a.channel_name !== a.channel_code ? a.channel_name + ' (' + a.channel_code + ')' : a.channel_code;
    document.getElementById('m-badge').innerHTML = '<span class="asev ' + (sevMap2[a.severity]||'sw') + '">' + (sevLbl2[a.severity]||a.severity) + '</span>';
    document.getElementById('m-title').textContent = (a.service||'-') + ' [' + (a.channel_name||a.channel_code||'-') + ']';
    document.getElementById('m-body').innerHTML =
      '<div class="dr"><div class="dk">Tespit Zamani:</div><div class="dv">' + (a.detected_at ? new Date(a.detected_at).toLocaleString('tr-TR',{timeZone:'Europe/Istanbul'}) : '-') + '</div></div>' +
      '<div class="dr"><div class="dk">Anomali Tipi:</div><div class="dv">' + (a.anomaly_type||'-') + '</div></div>' +
      '<div class="dr"><div class="dk">Servis:</div><div class="dv" style="color:var(--acc)">' + (a.service||'-') + '</div></div>' +
      '<div class="dr"><div class="dk">Kanal:</div><div class="dv">' + (chDisplay||'-') + '</div></div>' +
      '<div class="dr"><div class="dk">Skor:</div><div class="dv" style="color:var(--red)">' + (a.score ? a.score.toFixed(2) : '-') + '</div></div>' +
      '<div class="dr"><div class="dk">Hata Orani:</div><div class="dv">%' + (((a.error_rate||0)*100).toFixed(1)) + '</div></div>' +
      '<div class="dr"><div class="dk">Elapsed Ort.:</div><div class="dv">' + (a.elapsed_mean ? a.elapsed_mean.toFixed(0) : '-') + ' ms</div></div>' +
      '<div class="dr"><div class="dk">Islem Sayisi:</div><div class="dv">' + (a.tx_count||0) + '</div></div>' +
      '<div class="dr"><div class="dk">Result Kodu:</div><div class="dv">' + (a.result_code||'-') + (a.result_desc ? ' - ' + a.result_desc : '') + '</div></div>' +
      '<div class="dr"><div class="dk">Onay Durumu:</div><div class="dv">' +
        (a.is_false_positive ? 'FALSE POSITIVE - ' + (a.false_positive_by||'') + (a.false_positive_reason ? ' - ' + a.false_positive_reason : '') :
        a.acknowledged ? 'Onaylandi - ' + (a.acknowledged_by||'') + ' - ' + (a.acknowledged_at ? new Date(a.acknowledged_at).toLocaleString('tr-TR',{timeZone:'Europe/Istanbul'}) : '') : 'Onaylanmadi') +
      '</div></div>' +
      '<div class="divline"></div>' +
      '<div style="font-size:11px;color:var(--txt2);line-height:1.7;margin-bottom:10px">' + (a.details||a.summary||'-') + '</div>' +
      (a.ai_analysis ? '<div style="background:linear-gradient(135deg,rgba(124,58,237,.07),rgba(37,99,235,.05));border:1px solid rgba(124,58,237,.2);border-radius:10px;padding:12px 14px;margin-top:10px"><div style="font-size:9px;color:var(--acc3);margin-bottom:7px;font-weight:700">AI KOK NEDEN</div><div style="font-size:11px;color:var(--txt);line-height:1.75">' + a.ai_analysis + '</div></div>' : '') +

      (!a.is_false_positive && hasPerm('log.anomalies.ack') ? '<button class="btn r" onclick="openFPModal(' + a.id + ')">False Positive</button>' : '') +

      '</div>';

async function ackAnomaly(id) {
  try {
    await apiFetch('/api/v1/anomalies/' + id + '/acknowledge', {method:'POST'});
    toast('Anomali onaylandi', 's');
    var ap = document.querySelector('.page.active');
    if (ap && ap.id==='page-anomalies') loadAnomalies('all', null);
    if (ap && ap.id==='page-dashboard') loadDashboard();
  } catch(e) { toast('Hata: ' + e.message, 'e'); }
}

function openFPModal(id) {
  _fpAnomalyId = id;
  document.getElementById('fp-reason').value = '';
  document.getElementById('fp-overlay').classList.add('open');
  closeModal();
}
function closeFPModal() { document.getElementById('fp-overlay').classList.remove('open'); _fpAnomalyId = null; }

async function submitFP() {
  if (!_fpAnomalyId) return;
  var reason = document.getElementById('fp-reason').value.trim();
  try {
    await apiFetch('/api/v1/anomalies/' + _fpAnomalyId + '/false-positive', {method:'POST', body:JSON.stringify({reason:reason||null})});
    closeFPModal();
    toast('False positive isaretlendi', 'w');
    var ap = document.querySelector('.page.active');
    if (ap && ap.id==='page-anomalies') loadAnomalies('all',null);
    if (ap && ap.id==='page-dashboard') loadDashboard();
  } catch(e) { toast('Hata: ' + e.message, 'e'); }
}

    var settings = await apiFetch('/api/v1/settings');

      '<div class="g2">' +
      '<div class="card"><div class="ctitle">Model Ayarlari</div>' +
      '<div class="pr" style="margin-bottom:14px"><div class="pl" style="font-size:12px;font-weight:600;flex:1">Z-Score Motoru</div><button id="toggle-zscore" class="toggle ' + (s['zscore_enabled']==='true'?'on':'off') + '" onclick="toggleSetting(this)"></button><span style="font-size:10px;color:var(--txt2);margin-left:8px">' + (s['zscore_enabled']==='true'?'Aktif':'Pasif') + '</span></div>' +

      '</div>' +
      '<div class="card"><div class="ctitle">Genel Ayarlar</div>' +
      settingInput('min_tx_count','Min. TX Sayisi',s['min_tx_count'],'Minimum islem sayisi') +
      settingInput('cooldown_seconds','Cooldown (sn)',s['cooldown_seconds'],'Bekleme suresi') +
      settingInput('sliding_window_seconds','Sliding Window (sn)',s['sliding_window_seconds'],'Hata kodu penceresi') +
      '</div>' +
      '<div class="card"><div class="ctitle">Elapsed Esikleri (ms)</div>' +
      settingInput('rule_elapsed_disaster','DISASTER (ms)',s['rule_elapsed_disaster'],'') +
      settingInput('rule_elapsed_high','HIGH (ms)',s['rule_elapsed_high'],'') +
      '</div>' +
      '<div class="card"><div class="ctitle">Hata Orani Esikleri</div>' +
      settingInput('rule_error_rate_disaster','DISASTER (0-1)',s['rule_error_rate_disaster'],'') +

      '<div class="card"><div class="ctitle">Spike Esikleri</div>' +
      settingInput('sys_error_code_threshold','SYS Spike',s['sys_error_code_threshold'],'') +

function settingInput(key, label, value, hint) {
  return '<div style="margin-bottom:12px"><label style="font-size:10px;color:var(--txt2);display:block;margin-bottom:4px;font-weight:600">' + label + '</label><input id="setting-' + key + '" class="sinput" value="' + (value||'') + '" />' + (hint ? '<div style="font-size:9px;color:var(--txt3);margin-top:2px">' + hint + '</div>' : '') + '</div>';
}

function toggleSetting(btn) {
  btn.classList.toggle('on'); btn.classList.toggle('off');
  var span = btn.nextElementSibling;
  if (span) span.textContent = btn.classList.contains('on') ? 'Aktif' : 'Pasif';
}

async function saveAnomSettings() {
  var btn = document.getElementById('save-settings-btn');
  btn.disabled = true; btn.textContent = 'Kaydediliyor...';
  try {
    var body = {};
    var zscore = document.getElementById('toggle-zscore');
    if (zscore) body['zscore_enabled'] = zscore.classList.contains('on') ? 'true' : 'false';
    var ifEl = document.getElementById('toggle-if');
    if (ifEl) body['if_enabled'] = ifEl.classList.contains('on') ? 'true' : 'false';
    ['min_tx_count','cooldown_seconds','sliding_window_seconds','rule_elapsed_disaster','rule_elapsed_high','rule_error_rate_disaster','rule_error_rate_high','sys_error_code_threshold','biz_error_code_threshold'].forEach(function(k) {
      var el = document.getElementById('setting-' + k);
      if (el) body[k] = el.value.trim();
    });
    await apiFetch('/api/v1/settings', {method:'POST', body:JSON.stringify(body)});
    toast('Ayarlar kaydedildi', 's');
  } catch(e) { toast('Hata: ' + e.message, 'e'); }
  btn.disabled = false; btn.textContent = 'Kaydet';
}

async function loadChannels() {
  var el = document.getElementById('page-channels');
  el.innerHTML =
    '<div class="phead"><div><div class="pt">Kanal Tanimlari</div></div></div>' +
    '<div class="card" style="margin-bottom:16px"><div class="ctitle">Yeni Kanal / Guncelle</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr 2fr auto;gap:10px;align-items:end">' +
    '<div><label style="font-size:10px;color:var(--txt2);display:block;margin-bottom:4px;font-weight:600">Kod</label><input id="ch-code" class="sinput" placeholder="708"/></div>' +
    '<div><label style="font-size:10px;color:var(--txt2);display:block;margin-bottom:4px;font-weight:600">Ad</label><input id="ch-name" class="sinput" placeholder="Gorumez Bankacilik"/></div>' +
    '<div><label style="font-size:10px;color:var(--txt2);display:block;margin-bottom:4px;font-weight:600">Aciklama</label><input id="ch-desc" class="sinput" placeholder="Opsiyonel..."/></div>' +

}

async function loadChannelList() {
  try {
    var channels = await apiFetch('/api/v1/channel-mappings');
    var html = '<div class="card"><div class="ctitle">Tanimli Kanallar (' + channels.length + ')</div>' +
      '<table class="tbl"><thead><tr><th>Kod</th><th>Kanal Adi</th><th>Aciklama</th><th>Islem</th></tr></thead><tbody>';
    channels.forEach(function(c) {
      html += '<tr onclick="editChannel(\'' + c.channel_code + '\',\'' + c.channel_name.replace(/'/g, "\\'") + '\',\'' + (c.description||'').replace(/'/g, "\\'") + '\')" style="cursor:pointer">' +
        '<td style="font-weight:700;color:var(--acc)">' + c.channel_code + '</td>' +
        '<td style="font-weight:600">' + c.channel_name + '</td>' +
        '<td>' + (c.description||'-') + '</td>' +
        '<td onclick="event.stopPropagation()"><button class="btn r" style="padding:2px 8px;font-size:9px" onclick="deleteChannel(\'' + c.channel_code + '\')">Sil</button></td></tr>';
    });
    html += '</tbody></table></div>';
    document.getElementById('ch-list').innerHTML = html;
  } catch(e) { document.getElementById('ch-list').innerHTML = errorHtml(e.message); }
}

function editChannel(code, name, desc) {
  document.getElementById('ch-code').value = code;
  document.getElementById('ch-name').value = name;
  document.getElementById('ch-desc').value = desc || '';
}

async function saveChannel() {
  var code = document.getElementById('ch-code').value.trim();
  var name = document.getElementById('ch-name').value.trim();
  var desc = document.getElementById('ch-desc').value.trim();
  if (!code || !name) { toast('Kod ve ad zorunlu', 'w'); return; }
  try {
    await apiFetch('/api/v1/channel-mappings', {method:'POST', body:JSON.stringify({channel_code:code, channel_name:name, description:desc||null})});
    toast('Kaydedildi: ' + code + ' -> ' + name, 's');
    document.getElementById('ch-code').value = '';
    document.getElementById('ch-name').value = '';
    document.getElementById('ch-desc').value = '';
    await loadChannelList();
  } catch(e) { toast('Hata: ' + e.message, 'e'); }
}

async function deleteChannel(code) {
  if (!confirm(code + ' silinsin mi?')) return;
  try {
    await apiFetch('/api/v1/channel-mappings/' + code, {method:'DELETE'});
    toast('Silindi: ' + code, 'w');
    await loadChannelList();
  } catch(e) { toast('Hata: ' + e.message, 'e'); }
}

function openPwdModal() {
  document.getElementById('pwd-current').value=''; document.getElementById('pwd-new').value=''; document.getElementById('pwd-confirm').value='';
  document.getElementById('pwd-err').style.display='none';
  document.getElementById('pwd-overlay').classList.add('open');
}
function closePwdModal() { document.getElementById('pwd-overlay').classList.remove('open'); }

async function doChangePassword() {
  var current=document.getElementById('pwd-current').value;
  var newpwd=document.getElementById('pwd-new').value;
  var confirm=document.getElementById('pwd-confirm').value;
  var errEl=document.getElementById('pwd-err');
  if (!current||!newpwd||!confirm) { errEl.textContent='Tum alanlar zorunlu'; errEl.style.display='block'; return; }
  if (newpwd.length<8) { errEl.textContent='Min 8 karakter'; errEl.style.display='block'; return; }
  if (newpwd!==confirm) { errEl.textContent='Sifreler eslesmıyor'; errEl.style.display='block'; return; }
  try {
    await apiFetch('/api/v1/user/change-password', {method:'POST', body:JSON.stringify({current_password:current, new_password:newpwd})});
    closePwdModal(); toast('Sifre degistirildi', 's'); setTimeout(function(){doLogout();}, 2000);
  } catch(e) { errEl.textContent=e.message||'Hata'; errEl.style.display='block'; }
}

function loadingHtml() { return '<div class="loading"><div class="spinner"></div>Yukleniyor...</div>'; }
function emptyHtml(msg) { return '<div style="text-align:center;padding:30px;color:var(--txt3);font-size:12px">' + msg + '</div>'; }
function errorHtml(msg) { return '<div style="text-align:center;padding:30px;color:var(--red);font-size:12px">Hata: ' + msg + '</div>'; }

function toast(msg, type) {
  type = type || 'i';
  var wrap = document.getElementById('toast-wrap');
  var t = document.createElement('div');
  t.className = 'toast ' + type;
  var icons = {s:'OK',e:'HATA',i:'BILGI',w:'UYARI'};
  t.innerHTML = '<span>' + (icons[type]||'') + '</span><span>' + msg + '</span>';
  wrap.appendChild(t);
  setTimeout(function() { t.style.opacity='0'; t.style.transform='translateX(20px)'; t.style.transition='all .3s'; setTimeout(function(){t.remove();},300); }, 3800);
}
</script>
